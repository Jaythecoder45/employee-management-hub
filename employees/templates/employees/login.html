<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Employee Hub</title>
    <link rel="stylesheet" href="/static/employees/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #111827 0%, #0b0f19 100%);
            margin: 0;
            padding: 1.5rem;
        }
        
        .login-card {
            background-color: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            animation: cardFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .login-logo svg {
            color: var(--primary);
            width: 32px;
            height: 32px;
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-btn {
            width: 100%;
            padding: 0.85rem;
            font-size: 0.95rem;
            margin-top: 1.5rem;
        }
        
        .login-error {
            background-color: var(--danger-light);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            font-size: 0.825rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            list-style: none;
            padding-left: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Employee Hub</span>
        </div>
        
        <p class="login-subtitle">Sign in to your Employee Hub portal</p>
        
        {% if form.errors %}
            <div class="login-error">
                Your email and password did not match. Please try again.
            </div>
        {% endif %}
        
        <form method="post" class="django-form" novalidate>
            {% csrf_token %}
            
            <div class="form-field-group">
                <label class="form-label" for="username">Email Address</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Enter your email address" required autofocus>
            </div>
            
            <div class="form-field-group" style="margin-top: 1.25rem;">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary login-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
